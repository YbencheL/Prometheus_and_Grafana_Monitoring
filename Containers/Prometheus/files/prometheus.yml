global:
  scrape_interval: 15s
  scrape_timeout: 5s
  
rule_files:
  - "rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'node-serv'
    static_configs:
      - targets: ['node-serv:8000']
    metrics_path: '/metrics'
